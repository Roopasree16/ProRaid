{% extends 'base.html' %}

{% block content %}
<div class="container mt-5">
    <div class="row mb-5 justify-content-center">
        <div class="col-md-8 text-center">
            <h2 class="mb-3" style="font-weight: 900; font-size: 3rem;">Franchise Discovery</h2>
            <p class="text-muted mb-4 fs-5">Analyze team performance, discover core strengths, and view the leadership roster of any Pro Kabaddi franchise.</p>
            <div class="search-container mb-4" style="max-width: 800px; margin: 0 auto; position: relative;">
                <div class="search-wrapper">
                    <i class="fa-solid fa-shield-halved search-icon"></i>
                    <input type="text" id="teamSearchInput" class="search-input py-3 fs-4" placeholder="Search for any franchise (e.g., Patna Pirates)" autocomplete="off">
                </div>
                <div id="teamAutocomplete" class="autocomplete-results shadow-lg mt-2"></div>
            </div>
        </div>
    </div>



    <!-- Popular Teams Grid -->
    <div class="row mb-5 justify-content-center">
        <div class="col-md-10">
            <h4 class="mb-4 fw-bold">Active Franchises</h4>
            <div class="row">
                {% for t in popular_teams %}
                <div class="col-md-3 col-6 mb-4">
                    <a href="/team/{{ t.team_name }}" class="text-decoration-none text-dark">
                        <div class="premium-card text-center h-100 p-4">
                            <div class="profile-avatar mx-auto mb-3" style="width: 60px; height: 60px; font-size: 1.5rem; color: var(--primary); background: rgba(249, 115, 22, 0.1);">
                                <i class="fa-solid fa-users"></i>
                            </div>
                            <div class="fw-bold mb-2 fs-5">{{ t.team_name }}</div>

                        </div>
                    </a>
                </div>
                {% endfor %}
            </div>
        </div>
    </div>
</div>
{% endblock %}
